<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#007b70" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="A local trade show passport raffle PWA mockup."
    />
    <title>Trade Show Passport Raffle</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      ;(() => {
        const pathname = window.location.pathname.replace(/\/$/, '') || '/'
        if (pathname === '/admin') return

        const readAuth = (params) => {
          const type = params.get('type')
          const accessToken = params.get('access_token')
          if (!accessToken || !['invite', 'recovery', 'magiclink'].includes(type)) {
            return null
          }
          return `#${params.toString()}`
        }

        const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''))
        const hash = readAuth(hashParams) || readAuth(new URLSearchParams(window.location.search))
        if (hash) {
          window.history.replaceState(null, '', `/admin${hash}`)
        }
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
